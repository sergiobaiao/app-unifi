---
configuration:
  log_level:
    name: Niveau de log
    description: >-
      Contrôle le niveau de détails des journaux fournis par l'application.
  system_ip:
    name: IP du système
    description: >-
      Spécifiez manuellement l'adresse IP ou le nom d'hôte que les appareils UniFi
      doivent utiliser pour "informer" le contrôleur.
network:
  443/tcp: Utilisé pour le portail HTTPS et l'interface utilisateur
  1900/udp: Port découvrable de niveau 2
  3478/udp: Utilisé pour STUN
  5005/tcp: Protocole de contrôle RTP
  5671/tcp: AQMPS
  6789/tcp: Utilisé pour le test de vitesse mobile UniFi
  8080/tcp: Utilisé pour la communication entre les appareils et le contrôleur
  8443/tcp: Utilisé pour l'interface de l'application réseau UniFi
  8444/tcp: Portail sécurisé pour Hotspot
  8843/tcp: Utilisé pour la redirection du portail HTTPS
  8880/tcp: Utilisé pour la redirection du portail Hotspot (HTTP)
  8881/tcp: Utilisé pour la redirection du portail Hotspot (HTTP)
  8882/tcp: Utilisé pour la redirection du portail Hotspot (HTTP)
  9543/tcp: UniFi Identity Hub
  10001/udp: Utilisé pour la découverte d'appareils
  10003/udp: Utilisé pour la découverte d'appareils
  11084/tcp: UniFi Site Supervisor
  11443/tcp: Interface de gestion principale UniFi OS
