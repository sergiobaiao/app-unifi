---
configuration:
  log_level:
    name: Poziom logowania
    description: >-
      Kontroluje poziom szczegółowości logów, jaki zapewnia aplikacja.
  system_ip:
    name: IP systemu
    description: >-
      Ręcznie określ adres IP lub nazwę hosta, której urządzenia UniFi
      powinny używać do raportowania ("inform") do kontrolera.
