---
name: UniFi OS Server
version: dev
slug: unifi
description: Manage your UniFi network using a web browser
url: https://github.com/hassio-addons/app-unifi
webui: https://[HOST]:[PORT:11443]
startup: services
arch:
  - aarch64
  - amd64
init: false
full_access: true
apparmor: false
host_pid: true
host_dbus: true
privileged:
  - SYS_ADMIN
  - NET_ADMIN
backup: cold
map:
  - backup:rw
ports:
  1900/udp: null
  3478/udp: 3478
  5005/tcp: 5005
  5671/tcp: 5671
  6789/tcp: 6789
  8080/tcp: 8080
  8443/tcp: 8443
  8444/tcp: 8444
  8843/tcp: 8843
  8880/tcp: 8880
  8881/tcp: 8881
  8882/tcp: 8882
  9543/tcp: 9543
  10001/udp: 10001
  10003/udp: 10003
  11084/tcp: 11084
  11443/tcp: 11443
ports_description:
  1900/udp: L2 discoverable port
  3478/udp: Used for STUN
  5005/tcp: RTP control protocol
  5671/tcp: AQMPS
  6789/tcp: Used for UniFi mobile speed test
  8080/tcp: Used for device and controller communication
  8443/tcp: Used for UniFi OS Server interface
  8444/tcp: Secure Portal for Hotspot
  8843/tcp: Used for HTTPS portal redirection
  8880/tcp: Used for Hotspot portal redirection (HTTP)
  8881/tcp: Used for Hotspot portal redirection (HTTP)
  8882/tcp: Used for Hotspot portal redirection (HTTP)
  9543/tcp: UniFi Identity Hub
  10001/udp: Used for device discovery
  10003/udp: Used for device discovery
  11084/tcp: UniFi Site Supervisor
  11443/tcp: Primary UniFi OS management interface
hassio_api: true
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  system_ip: str?
